name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Job 1: Install & Cache Dependencies
  setup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 18.x ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify installation
        run: npm list

  # Job 2: Security Audit
  security:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for high vulnerabilities
        run: |
          HIGH_VULNS=$(npm audit json 2>/dev/null | jq '[.vulnerabilities[] | select(.severity == "high" or .severity == "critical")] | length')
          if [ "$HIGH_VULNS" -gt 0 ]; then
            echo "⚠️ Found $HIGH_VULNS high/critical vulnerabilities"
            npm audit json | jq '.vulnerabilities | to_entries[] | select(.value.severity == "high" or .value.severity == "critical") | {package: .key, severity: .value.severity, fix_available: .value.fixAvailable}'
            exit 1
          fi

  # Job 3: Build Verification
  build:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'placeholder' }}

      - name: Check build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist directory not created"
            exit 1
          fi
          echo "✅ Build successful"
          du -sh dist
          find dist -type f | wc -l | xargs echo "Files in dist:"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist
          retention-days: 5

  # Job 4: Test Coverage
  test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'placeholder' }}

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          retention-days: 30

  # Job 5: Lint & Format (Optional - requires ESLint/Prettier setup)
  lint:
    runs-on: ubuntu-latest
    needs: setup
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check if ESLint is configured
        id: eslint-check
        run: |
          if npm list eslint >/dev/null 2>&1; then
            echo "eslint-available=true" >> $GITHUB_OUTPUT
          else
            echo "eslint-available=false" >> $GITHUB_OUTPUT
          fi

      - name: Run linter
        if: steps.eslint-check.outputs.eslint-available == 'true'
        run: npm run lint
        continue-on-error: true

      - name: ESLint not configured
        if: steps.eslint-check.outputs.eslint-available == 'false'
        run: echo "⚠️ ESLint not configured. Run 'npm install --save-dev eslint' to enable linting."

  # Job 6: Type Check (Optional - requires TypeScript setup)
  type-check:
    runs-on: ubuntu-latest
    needs: setup
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check if TypeScript is configured
        id: ts-check
        run: |
          if npm list typescript >/dev/null 2>&1 && [ -f tsconfig.json ]; then
            echo "typescript-available=true" >> $GITHUB_OUTPUT
          else
            echo "typescript-available=false" >> $GITHUB_OUTPUT
          fi

      - name: Run type checker
        if: steps.ts-check.outputs.typescript-available == 'true'
        run: npm run type-check
        continue-on-error: true

      - name: TypeScript not configured
        if: steps.ts-check.outputs.typescript-available == 'false'
        run: echo "⚠️ TypeScript not configured. Run 'npm install --save-dev typescript' to enable type checking."

  # Final Status Check
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [ security, build, test ]
    if: always()
    steps:
      - name: Check CI status
        run: |
          if [ "${{ needs.security.result }}" == "failure" ] || [ "${{ needs.build.result }}" == "failure" ] || [ "${{ needs.test.result }}" == "failure" ]; then
            echo "❌ CI Pipeline failed"
            exit 1
          fi
          echo "✅ CI Pipeline passed"

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const buildResult = '${{ needs.build.result }}';
            const testResult = '${{ needs.test.result }}';
            const securityResult = '${{ needs.security.result }}';

            let status = '✅ All checks passed!';
            if (buildResult === 'failure' || testResult === 'failure' || securityResult === 'failure') {
              status = '❌ Some checks failed';
              if (buildResult === 'failure') status += '\n- Build failed';
              if (testResult === 'failure') status += '\n- Tests failed';
              if (securityResult === 'failure') status += '\n- Security audit failed';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## CI Pipeline Status\n${status}\n\n[View full workflow run →](${context.payload.pull_request?.html_url || context.server_url}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });

  # Deploy to Vercel (if all checks pass)
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [ build, test, security ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist

      - name: Deploy to Vercel
        run: |
          echo "📦 Deploying to Vercel..."
          echo "Note: Configure Vercel deployment in your project settings or use Vercel GitHub integration"
          ls -la dist/ | head -20

      - name: Notify Slack
        if: always()
        run: |
          echo "📢 Deployment notification would be sent here"
